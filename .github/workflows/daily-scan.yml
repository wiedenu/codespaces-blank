name: Daily Polymarket Scan

on:
  schedule:
    - cron: '0 14 * * *'  # 8am CT (UTC-6) daily
  workflow_dispatch:       # manual trigger from Actions tab

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: polymarket-arb

      - name: Run daily scan
        run: python main.py --no-trade --no-deep --markets 300
        working-directory: polymarket-arb
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit history update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add polymarket-arb/data/history.jsonl
          git diff --staged --quiet || git commit -m "Daily scan $(date -u +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload full data artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scan-${{ github.run_number }}
          path: polymarket-arb/data/
          retention-days: 90
