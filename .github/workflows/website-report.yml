name: Website Performance Report

on:
  schedule:
    - cron: '0 14 1 * *'  # 1st of every month at 9am CT
  workflow_dispatch:        # manual trigger anytime

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r website-report/requirements.txt

      - name: Generate report
        env:
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          HUBSPOT_API_TOKEN:    ${{ secrets.HUBSPOT_API_TOKEN }}
        run: python website-report/report.py --output docs/website-report.html

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/website-report.html
          git diff --staged --quiet || git commit -m "Website performance report $(date +%Y-%m-%d)"
          git push

      - name: Set report date
        run: echo "REPORT_DATE=$(date +'%B %Y')" >> $GITHUB_ENV

      - name: Email report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: wiedenu@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "GreatAmerica.com Website Report — ${{ env.REPORT_DATE }}"
          to: wiedenu@gmail.com
          from: wiedenu@gmail.com
          body: "Your monthly website performance report is attached. Open the HTML file in a browser to view the dashboard."
          attachments: docs/website-report.html
